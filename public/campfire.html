    <script src="https://unpkg.com/tone@15/build/Tone.js"></script>
    <script>
      // CSS Campfire animation: https://codepen.io/OfigenusMaximus/pen/oNyoORG

      const socket = new WebSocket(`ws://${location.host}/campfire`);

      const bpm = 100;
      const SCALE = ["C", "D", "E", "G", "A"];
      const OCTAVE = { guitar: 3, piano: 4, flute: 5 };

      const fire = document.querySelector(".fire");

      socket.onopen = () => {
        console.log("WebSocket connection established - campfire");
        socket.send(JSON.stringify({ address: "/hello", args: ["campfire"] }));
      };

      socket.onmessage = (event) => {
        console.log("Message from server:", event.data);
        let parsedMsg = JSON.parse(event.data);
        if (parsedMsg.address === "/note") {
          if (!synths || !transport) return;
          const [instrument, noteIndex, octaveOffset = 0] = parsedMsg.args;
          const synth = synths[instrument];
          if (synth && transport) {
            const time = transport.nextSubdivision("8n");

            if (instrument === "drums") {
              const bongoPitch = noteIndex === 0 ? "C2" : "G2"; // low (left) vs high (right)
              synth.triggerAttackRelease(bongoPitch, "8n", time);
            } else {
              const pitch =
                SCALE[noteIndex] + (OCTAVE[instrument] + octaveOffset);
              synth.triggerAttackRelease(pitch, "8n", time);
            }

            fire.classList.add("note-hit");
            setTimeout(() => fire.classList.remove("note-hit"), 80);
          }
        }
      };

      socket.onclose = () => {
        console.log("WebSocket connection closed");
      };

      socket.onerror = (error) => {
        console.error("WebSocket error:", error);
      };

      let synths,
        transport = null;

      document.getElementById("start").addEventListener("click", async () => {
        await Tone.start();
        synths = {
          guitar: new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "triangle" },
            envelope: { attack: 0.005, decay: 0.5, sustain: 0.0, release: 0.3 },
          }).toDestination(),
          piano: new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "sine" },
            envelope: { attack: 0.005, decay: 0.4, sustain: 0.4, release: 1.8 },
          }).toDestination(),
          flute: new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "sine" },
            envelope: { attack: 0.15, decay: 0.1, sustain: 0.9, release: 0.4 },
          }).toDestination(),
          drums: new Tone.MembraneSynth({
            pitchDecay: 0.008,
            octaves: 1,
            envelope: { attack: 0.001, decay: 0.2, sustain: 0, release: 0.1 },
          }).toDestination(),
        };
        transport = Tone.getTransport();
        transport.bpm.value = bpm;
        transport.start();
        console.log("audio ready");
      });
    </script>
