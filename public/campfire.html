<!doctype html>
<html lang="en">
  <head>
    <title>Client</title>
    <style>
      #circle {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        margin: 50px auto;
        background: rgb(212, 138, 0);
        transition: transform 1s ease-out;
      }
    </style>
  </head>
  <body>
    <h1>Virtual Campfire</h1>
    <button id="start">Start campfire session</button>
    <div id="circle"></div>
    <script src="https://unpkg.com/tone@15/build/Tone.js"></script>
    <script>
      const socket = new WebSocket(`ws://${location.host}/campfire`);

      // Musical constants - starting with defaults, will be experimented with
      const bpm = 100;
      const SCALE = ["C", "D", "E", "G", "A"];
      const OCTAVE = { guitar: 3, piano: 4 };

      const circle = document.getElementById("circle");

      socket.onopen = () => {
        console.log("WebSocket connection established - campfire");

        // Send the handshake message to the server
        socket.send(JSON.stringify({ address: "/hello", args: ["campfire"] }));
      };

      // When the campfire receives a note message from the server, play the corresponding sound and animation
      socket.onmessage = (event) => {
        console.log("Message from server:", event.data);
        let parsedMsg = JSON.parse(event.data);
        if (parsedMsg.address === "/note") {
          // Parsing the message to get the note's instrument and index
          const [instrument, noteIndex] = parsedMsg.args;
          const synth = synths[instrument];
          if (synth && transport) {
            // Calculating the pitch based on index and octave
            const pitch = SCALE[noteIndex] + OCTAVE[instrument];
            // Quantizing the note to the nearest 8th note to prevent latency
            const time = transport.nextSubdivision("8n");
            synth.triggerAttackRelease(pitch, "8n", time);

            // simple CSS animation that 
            circle.style.transform = "scale(2.5)";
            setTimeout(() => {
              circle.style.transform = "scale(1)";
            }, 100);
          }
        }
      };

      socket.onclose = () => {
        console.log("WebSocket connection closed");
      };

      socket.onerror = (error) => {
        console.error("WebSocket error:", error);
      };

      let synths,
        transport = null;

      document.getElementById("start").addEventListener("click", async () => {
        await Tone.start();
        // Creating synths for each instrument type - for now just 2 options (guitar and piano)
        synths = {
          guitar: new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "triangle" },
            envelope: { attack: 0.005, decay: 0.5, sustain: 0.0, release: 0.3 },
          }).toDestination(),
          piano: new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "sine" },
            envelope: { attack: 0.005, decay: 0.4, sustain: 0.4, release: 1.8 },
          }).toDestination(),
        };
        transport = Tone.getTransport();
        transport.bpm.value = bpm;
        transport.start();
        console.log("audio ready");
      });
    </script>
  </body>
</html>
