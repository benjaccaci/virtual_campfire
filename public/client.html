<!doctype html>
<html lang="en">
  <head>
    <title>Client</title>
  </head>
  <body>
    <h1>Play music at the campfire!</h1>
    <button data-note="0">Note 0</button>
    <button data-note="1">Note 1</button>
    <button data-note="2">Note 2</button>
    <button data-note="3">Note 3</button>
    <button data-note="4">Note 4</button>
    <script>
      const socket = new WebSocket(`ws://${location.host}`);

      socket.onopen = () => {
        console.log("WebSocket connection established - controller");

        // Send the handshake message
        socket.send(
          JSON.stringify({ address: "/hello", args: ["controller"] }),
        );

        // Choose an instrument (we'll go guitar for now)
        socket.send(JSON.stringify({ address: "/join", args: ["guitar"] }));
      };

      socket.onmessage = (event) => {
        console.log("Message from server:", event.data);
      };

      socket.onclose = () => {
        console.log("WebSocket connection closed");
      };

      socket.onerror = (error) => {
        console.error("WebSocket error:", error);
      };

      document.querySelectorAll("button").forEach((btn) => {
        btn.addEventListener("click", () => {
          const noteIndex = Number(btn.dataset.note);
          socket.send(
            JSON.stringify({ address: "/note", args: ["guitar", noteIndex] }),
          );
        });
      });
    </script>
  </body>
</html>
