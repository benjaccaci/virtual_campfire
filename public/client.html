<!doctype html>
<html lang="en">
  <head>
    <title>Client</title>
    <link rel="stylesheet" href="client_styling.css" />
  </head>
  <body>
    <h1>Play music at the campfire!</h1>
    <hr />
    <h3>Pick an instrument</h3>
    <button class="instrument-button" data-instrument="guitar">Guitar</button>
    <button class="instrument-button" data-instrument="banjo">Banjo</button>
    <button class="instrument-button" data-instrument="piano">Piano</button>
    <button class="instrument-button" data-instrument="drums">Drums</button>
    <button class="instrument-button" data-instrument="flute">Flute</button>
    <h3>Play some notes</h3>
    <div id="sharp-buttons">
      <button class="note-button sharp" data-note="0" data-sharp="true">
        C#
      </button>
      <button class="note-button sharp" data-note="1" data-sharp="true">
        D#
      </button>
      <button class="note-button sharp" data-note="2" data-sharp="true">
        E#
      </button>
      <button class="note-button sharp" data-note="3" data-sharp="true">
        G#
      </button>
      <button class="note-button sharp" data-note="4" data-sharp="true">
        A#
      </button>
    </div>
    <div id="note-buttons">
      <button class="note-button" data-note="0">C</button>
      <button class="note-button" data-note="1">D</button>
      <button class="note-button" data-note="2">E</button>
      <button class="note-button" data-note="3">G</button>
      <button class="note-button" data-note="4">A</button>
    </div>
    <div id="bongo-buttons" style="display: none">
      <button class="note-button" data-note="0">Left</button>
      <button class="note-button" data-note="1">Right</button>
    </div>
    <hr />
    <h3>Info Log:</h3>
    <p id="current_instrument"></p>
    <p id="lastkey"></p>
    <p>You can play base notes with: A S D G H</p>
    <p>You can play sharp notes with: Q W E R T</p>
    <p>You can change octaves with: + / -</p>
    <p>You can switch instruments with: 1 2 3 4 5</p>
    <script>
      const socket = new WebSocket(`ws://${location.host}`);

      let lastkey = "c";
      let lastPlayedNote = "C";
      let currentInstrument = "guitar";
      let octaveOffset = 0;

      function updateInfo() {
        document.getElementById("current_instrument").innerText =
          `You are currently playing the:   ${currentInstrument} (octave ${octaveOffset >= 0 ? "+" : ""}${octaveOffset})`;
        document.getElementById("lastkey").innerText =
          `Last pressed key: ${lastkey}   |     Last played note: ${lastPlayedNote}`;
      }

      document.body.dataset.instrument = currentInstrument;
      updateInfo();

      // Flash a button dark for 0.2 seconds
      function flashButton(btn) {
        if (!btn) return;
        btn.classList.add("pressed");
        setTimeout(() => btn.classList.remove("pressed"), 200);
      }

      // Helper that plays a note (css flash and message to server)
      function playNote(noteIndex, btn, sharp = false) {
        const naturalNames = ["C", "D", "E", "G", "A"];
        const sharpNames = ["C#", "D#", "E#", "G#", "A#"];
        lastPlayedNote = (sharp ? sharpNames : naturalNames)[noteIndex];
        document.getElementById("lastkey").innerText =
          `Last pressed key: ${lastkey}   |     Last played note: ${lastPlayedNote}`;

        flashButton(btn);
        socket.send(
          JSON.stringify({
            address: "/note",
            args: [currentInstrument, noteIndex, octaveOffset, sharp],
          }),
        );
      }

      // Helper that changes the instrument (css update and message to server)
      function selectInstrument(instrument) {
        currentInstrument = instrument;
        document.body.dataset.instrument = currentInstrument;

        const isDrums = instrument === "drums";
        document.getElementById("note-buttons").style.display = isDrums
          ? "none"
          : "block";
        document.getElementById("sharp-buttons").style.display = isDrums
          ? "none"
          : "block";
        document.getElementById("bongo-buttons").style.display = isDrums
          ? "block"
          : "none";

        updateInfo();
      }

      document.querySelectorAll("[data-instrument]").forEach((btn) => {
        btn.addEventListener("click", () =>
          selectInstrument(btn.dataset.instrument),
        );
      });

      document.querySelectorAll("[data-note]").forEach((btn) => {
        btn.addEventListener("click", () =>
          playNote(Number(btn.dataset.note), btn, btn.dataset.sharp === "true"),
        );
      });

      document.addEventListener("keydown", (event) => {
        const keyName = event.key;

        // +/- change the octave offset
        if (keyName === "+" || keyName === "=") {
          octaveOffset = Math.min(octaveOffset + 1, 2);
          updateInfo();
          return;
        }
        if (keyName === "-" || keyName === "_") {
          octaveOffset = Math.max(octaveOffset - 1, -2);
          updateInfo();
          return;
        }

        // Instrument switching key mapping
        const instrumentMap = {
          1: "guitar",
          2: "banjo",
          3: "piano",
          4: "drums",
          5: "flute",
        };
        if (keyName in instrumentMap) {
          selectInstrument(instrumentMap[keyName]);
          return;
        }

        lastkey = keyName;
        updateInfo();

        // Note key mapping for base notes
        const noteMap =
          currentInstrument === "drums"
            ? { a: 0, s: 1 }
            : { a: 0, s: 1, d: 2, g: 3, h: 4 };
        if (keyName in noteMap) {
          const noteIndex = noteMap[keyName];
          const container =
            currentInstrument === "drums" ? "#bongo-buttons" : "#note-buttons";
          const btn = document.querySelector(
            `${container} [data-note="${noteIndex}"]`,
          );
          playNote(noteIndex, btn);
        }
        // Note key mapping for sharps
        if (currentInstrument !== "drums") {
          const sharpMap = { q: 0, w: 1, e: 2, r: 3, t: 4 };
          if (keyName in sharpMap) {
            const noteIndex = sharpMap[keyName];
            const btn = document.querySelector(
              `#sharp-buttons [data-note="${noteIndex}"]`,
            );
            playNote(noteIndex, btn, true);
          }
        }
      });

      socket.onopen = () => {
        console.log("WebSocket connection established - controller");
        socket.send(
          JSON.stringify({ address: "/hello", args: ["controller"] }),
        );
      };

      // Logging server messages isn't necessary but helpful for dev
      socket.onmessage = (event) => {
        console.log("Message from server:", event.data);
      };

      socket.onclose = () => {
        console.log("WebSocket connection closed");
      };

      socket.onerror = (error) => {
        console.error("WebSocket error:", error);
      };
    </script>
  </body>
</html>
