<!doctype html>
<html lang="en">
  <head>
    <title>Client</title>
    <link rel="stylesheet" href="client_styling.css" />
  </head>
  <body>
    <h1>Play music at the campfire!</h1>
    <hr />
    <h3>Pick an instrument</h3>
    <button class="instrument-button" data-instrument="guitar">Guitar</button>
    <button class="instrument-button" data-instrument="piano">Piano</button>
    <button class="instrument-button" data-instrument="drums">Drums</button>
    <button class="instrument-button" data-instrument="flute">Flute</button>
    <h3>Play some notes</h3>
    <button class="note-button" data-note="0">C</button>
    <button class="note-button" data-note="1">D</button>
    <button class="note-button" data-note="2">E</button>
    <button class="note-button" data-note="3">G</button>
    <button class="note-button" data-note="4">A</button>
    <hr />
    <h3>Info Log:</h3>
    <p id="current_instrument"></p>
    <p id="lastkey"></p>
    <script>
      const socket = new WebSocket(`ws://${location.host}`);

      let lastkey = "c";
      let currentInstrument = "guitar";
      let octaveOffset = 0;

      function updateInfo() {
        document.getElementById("current_instrument").innerText =
          `You are currently playing the: ${currentInstrument} (octave ${octaveOffset >= 0 ? "+" : ""}${octaveOffset})`;
        document.getElementById("lastkey").innerText =
          `Last pressed key: ${lastkey}`;
      }

      document.body.dataset.instrument = currentInstrument;
      updateInfo();

      // Flash a button dark for 0.2 seconds
      function flashButton(btn) {
        if (!btn) return;
        btn.classList.add("pressed");
        setTimeout(() => btn.classList.remove("pressed"), 200);
      }

      // Helper that plays a note (css flash and message to server)
      function playNote(noteIndex, btn) {
        flashButton(btn);
        socket.send(
          JSON.stringify({
            address: "/note",
            args: [currentInstrument, noteIndex, octaveOffset],
          }),
        );
      }

      // Helper that changes the instrument (css update and message to server)
      function selectInstrument(instrument) {
        currentInstrument = instrument;
        document.body.dataset.instrument = currentInstrument;
        updateInfo();
      }

      document.querySelectorAll("[data-instrument]").forEach((btn) => {
        btn.addEventListener("click", () =>
          selectInstrument(btn.dataset.instrument),
        );
      });

      document.querySelectorAll("[data-note]").forEach((btn) => {
        btn.addEventListener("click", () =>
          playNote(Number(btn.dataset.note), btn),
        );
      });

      document.addEventListener("keydown", (event) => {
        const keyName = event.key;

        // +/- change the octave offset
        if (keyName === "+" || keyName === "=") {
          octaveOffset = Math.min(octaveOffset + 1, 2);
          updateInfo();
          return;
        }
        if (keyName === "-" || keyName === "_") {
          octaveOffset = Math.max(octaveOffset - 1, -2);
          updateInfo();
          return;
        }

        // Instrument switching key mapping
        const instrumentMap = {
          q: "guitar",
          w: "piano",
          e: "drums",
          r: "flute",
        };
        if (keyName in instrumentMap) {
          selectInstrument(instrumentMap[keyName]);
          return;
        }

        lastkey = keyName;
        updateInfo();

        // Note key mapping
        const noteMap = {
          a: 0, // C
          s: 1, // D
          d: 2, // E
          g: 3, // G
          h: 4, // A
        };
        if (keyName in noteMap) {
          const noteIndex = noteMap[keyName];
          const btn = document.querySelector(`[data-note="${noteIndex}"]`);
          playNote(noteIndex, btn);
        }
      });

      socket.onopen = () => {
        console.log("WebSocket connection established - controller");
        socket.send(
          JSON.stringify({ address: "/hello", args: ["controller"] }),
        );
      };

      // Logging server messages isn't necessary but helpful for dev
      socket.onmessage = (event) => {
        console.log("Message from server:", event.data);
      };

      socket.onclose = () => {
        console.log("WebSocket connection closed");
      };

      socket.onerror = (error) => {
        console.error("WebSocket error:", error);
      };
    </script>
  </body>
</html>
