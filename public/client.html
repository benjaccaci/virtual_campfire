<!doctype html>
<html lang="en">
  <head>
    <title>Client</title>
  </head>
  <body>
    <h1>Play music at the campfire!</h1>
    <h3>Pick an instrument</h3>
    <button data-instrument="guitar">Guitar</button>
    <button data-instrument="piano">Piano</button>
    <h3>Play some notes</h3>
    <button data-note="0">C</button>
    <button data-note="1">D</button>
    <button data-note="2">E</button>
    <button data-note="3">G</button>
    <button data-note="4">A</button>
    <p id="lastkey"></p>
    <script>
      const socket = new WebSocket(`ws://${location.host}`);

      let lastkey = "a";

      document.getElementById("lastkey").innerText = `Last key is: ${lastkey}`;

      // By default, users start with the guitar
      let currentInstrument = "guitar";
      document.querySelectorAll("[data-instrument]").forEach((btn) => {
        btn.addEventListener("click", () => {
          currentInstrument = btn.dataset.instrument;
        });
      });

      document.querySelectorAll("[data-note]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const noteIndex = Number(btn.dataset.note);
          socket.send(
            JSON.stringify({
              address: "/note",
              args: [currentInstrument, noteIndex],
            }),
          );
        });
      });

      document.addEventListener("keydown", (event) => {
        const keyName = event.key;
        lastkey = keyName;
        document.getElementById("lastkey").innerText =
          `Last key is: ${lastkey}`;
        const noteMap = {
          a: 0, // C
          s: 1, // D
          d: 2, // E
          g: 3, // G
          h: 4, // A
        };
        if (keyName in noteMap) {
          const noteIndex = noteMap[keyName];
          socket.send(
            JSON.stringify({
              address: "/note",
              args: [currentInstrument, noteIndex],
            }),
          );
        }
      });

      socket.onopen = () => {
        console.log("WebSocket connection established - controller");

        // Send the handshake message
        socket.send(
          JSON.stringify({ address: "/hello", args: ["controller"] }),
        );
      };

      socket.onmessage = (event) => {
        console.log("Message from server:", event.data);
      };

      socket.onclose = () => {
        console.log("WebSocket connection closed");
      };

      socket.onerror = (error) => {
        console.error("WebSocket error:", error);
      };
    </script>
  </body>
</html>
